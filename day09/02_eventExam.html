<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        exam은 카페에 제출

        이름, 국어, 영어, 수학점수를 입력받아 계산 버튼을 클릭하면
        ul => li 이름과 점수를 출력하고, 합계, 평균을 같이 출력
        Number() : string -> 숫자로 변경될 수 있는 모든 값 / 정수 + 실수
        parseInt() : 정수만 변경 가능.
    -->
        <fieldset>
            <legend>성적표</legend>
            이름 : <input type="text" id="name"> <br>
            국어 : <input type="text" id="kor"> <br>
            영어 : <input type="text" id="eng"> <br>
            수학 : <input type="text" id="math"><br>
            <button onclick="clickEvent()">성적계산</button>
        </fieldset>
        <ul id="ul"></ul>
        
        <script>
            function clickEvent(){
                const name = document.getElementById('name').value;
                const kor = Number(document.getElementById('kor').value);
                const eng = Number(document.getElementById('eng').value);
                const math = Number(document.getElementById('math').value);

                let sum = kor + eng + math;

                // 소수점 표현하는 방법 .toFixed(2) : 값을 소수점 2자리까지 표현
                // Math.round() : 정수로 리턴
                let avg = (sum / 3).toFixed(2);

                const ul = document.getElementById('ul');

                let str = `<li>name : ${name}</li>`;
                str += `<li>kor : ${kor}</li>`;
                str += `<li>eng : ${eng}</li>`;
                str += `<li>math : ${math}</li>`;
                str += `<li>sum : ${sum}</li>`;
                str += `<li>avg : ${avg}</li>`;

                ul.innerHTML = str;

                document.getElementById('name').value = '';
                document.getElementById('kor').value = '';
                document.getElementById('eng').value = '';
                document.getElementById('math').value = '';
            }
        </script>
</body>
</html>
