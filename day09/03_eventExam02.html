<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>할인율 구하기</legend>
         가격: <input type="text" id="price">원 <br>
         할인율: <input type="text" id="rate">% <br>
         <button id="btn">할인가격 계산</button>
    </fieldset>
    <!-- 가격과 할인율에 따른 지불금액을 구해주세요. -->
    <!-- 가격: / 할인율: / 할인금액: / 지불금액: -->
    <h1 id="printResult"></h1>

    <script>
        const price = document.getElementById('price');
        const rate = document.getElementById('rate');
        const btn = document.getElementById('btn');
        const printResult = document.getElementById('printResult');

        btn.addEventListener('click', function(){
            let savePrice = Number(price.value) * (Number(rate.value) / 100); // 할인 금액
            let salePrice = Number(price.value) - savePrice; // 지불금액

            printResult.innerText = `
            가격 : ${price.value}원 / 할인율 : ${rate.value}% 
            / 할인금액: ${Math.round(savePrice / 10)*10}원 / 지불금액: ${Math.round(salePrice/ 10)*10}원
            `;
        })


    </script>
</body>
</html>
