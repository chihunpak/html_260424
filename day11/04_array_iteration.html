<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        배열은 순환 구조(iteration)를 이용하여 특정 기능을 수행하는 메서드
    </h1>
    <!-- 
        java 에서는 람다/스트림 이라는 이름으로 사용

        - array.forEach(callback function) :  
            일반 반복문과 유사한 형태
        - array.map(callback function) : 
            forEach의 결과를 리턴하여 새로운 배열을 생성
        - array.filter(callback function) : 
            map 처럼 수행하면서 비교연산을 통해 true 값만 필터링하여 리턴
    -->

    <script>
        const numArray=[1,2,3,4,5,8,7,4,5,6];
        const strArray = ['a','k','l','y','p','i','e'];

        for(let num of numArray){
            console.log(num);
        }
        console.log("----------");

        for(let str of strArray){
            console.log(str);
        }

        console.log("--forEach(value, index, array)--");
        numArray.forEach(function(v,i,a){
            console.log(v, i, a);
        });

        console.log("--forEach(value, index)--");
        numArray.forEach(function(v,i){
            console.log(i, v);
        });

        console.log("--forEach(value)--");
        numArray.forEach(function(v){
            console.log(v)
        })

        // numArray 값을 합계 => 콘솔에 출력
        let sum = 0;
        numArray.forEach(function(v){
            sum += v;
        })
        console.log(sum);

        function print(v){
            console.log(v);
        }

        // 이미 만들어져 있는 함수를 콜백으로 호출
        // invoke callback function () 없음.
        strArray.forEach(print);

        console.log("---------");

        // 화살표 함수도 사용가능
        strArray.forEach((v)=>{
            console.log(v);
        })
        
        console.log("---------");
        // 파라미터가 1개라면 () 생략가능
        // 처리 구문도 1개라면 {} 생략가능
        strArray.forEach(v => console.log(v));
        console.log("---------");

        //map : 리턴이 가능
        console.log("--map(value, index, array)--");
        const newNumArr = numArray.map(function(v, i, a){
            return `${v}, ${i} / ${a}`;
        });
        console.log(newNumArr);

        const newNumArr2 = numArray.map(function(v, i){
            return `${i} => ${v}`;
        });
        console.log(newNumArr2);

        // forEach => return
        const newNumArr3 = numArray.forEach(function(v){
            return `${v}`;
        })
        console.log(newNumArr3); // undefined

        // map을 이용하여 numArray v*2 값을 배열로 리턴 => 콘솔에 출력
        // const numArray=[1,2,3,4,5,8,7,4,5,6];
        const map2 = numArray.map(function(v){
            return v * 2;
        });
        console.log(map2);

        // 처리 구문이 return  하나면 {} return 문구도 생략가능
        const map3 = numArray.map(v => v*3);
        console.log(map3);
        
        numArray
            .map(v => v*5)
            .forEach(n=>console.log(n));
        
        // filter
        console.log("--filter--");
        // numArray 5이상의 값만 리턴
        const map4 = numArray.filter(function(v){
            return v >= 5;
        });
        console.log(map4);

        // filter 사용하여 홀수만 출력
        const map5 = numArray.filter(v => {
            return v % 2 == 1;
        });
        console.log(map5);

        numArray.filter(v => v%2==1).forEach(n => console.log(n));


    </script>
</body>
</html>
