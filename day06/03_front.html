<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="reset.css"> -->
    <!-- 
        reset.css : html 요소 중 내부적으로 여백을 가지고 있는 태그들이 있음. 
        ul>li / a / p  => 원래 태그가 가지고 있는 값을 없애주는 역할
        
        width : 100% (부모의 기준) 부모가 없다면 화면 전체의 가로
        height : 100% (부모기준)
        vh / vw : 모니터(브라우저) 기준 높이 / 너비
    -->
    <style>
        /* link css 내부로 이동 */
        @import url(reset.css);
        .container{
            width: 100%;
            height: 100vh; /* 화면의 전체 */
            background: linear-gradient(rgba(0,0,0,0.03), rgba(0, 0, 0, 0.626)), 
                        url(../image/room.jpg);
            background-size: cover;
        }
        .container>.navbar{
            width: 90%;
            margin: 0 auto;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container>.navbar>h1{
            color: white;
            font-size: 25px;
            font-weight: 700;
        }
        .container>.navbar>ul{
            display: flex;
            justify-content: space-between;
        }
        .container>.navbar>ul>li{
            margin: 0 10px;
        }
        .container>.navbar>ul>li>a{
            color: white;
            font-weight: 700;
        }
        .container>.navbar>ul>li>a:hover{
            text-decoration: underline;
            color: rgb(163, 117, 24);
        }
        .container>.main{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }
        .container>.main>h2{
            font-size: 50px;
            font-weight: 700;
            margin-bottom: 40px;
        }
        .container>.main button{
            border: 2px solid black;
            font-size: 20px;
            font-weight: 700;
            padding: 15px 30px;
            border-radius: 10px;
            background-color: azure;
            transition: 0.5s; /* hover시 서서히 바뀌기 */
        }
        .container>.main button:hover{
            cursor: pointer;
            background-color: rgb(19, 10, 87);
            color: aliceblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h1>DESIGN</h1>
            <ul>
                <li><a href="">HOME</a></li>
                <li><a href="">LOGIN</a></li>
                <li><a href="">SIGNUP</a></li>
                <li><a href="">BOARD</a></li>
            </ul>
        </div>
        <div class="main">
            <h2>Welcome to Front-End World</h2>
            <a href=""><button>Learn More</button></a>
        </div>
    </div>
</body>
</html>
