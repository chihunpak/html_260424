<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .key, ul{
            width: 150px;
            padding: 10px 10px;
            border: 1px solid gray;
            border-radius: 10px;
            margin: 3px;
        }
        #result{
            padding: 10px;
        }
        ul{
            list-style: none;
        }
        ul>li{
            padding-left: 30px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>향상된 for</h1>
    <h3>
        for in / for of
    </h3>
    <!-- 
        for(변수 : 리스트){   // java  => :을 하지않고, in or of를 사용
            코드;
        }
        
        - for in : object 객체안의 내용을 탐색할 때 사용 { key:value }
            for(let key in object){
                code;
                object.key = value 가 리턴
            }
        
        - for of : array 배열안의 내용을 탐색할 때 사용 [ ] 
            for(let value of array){   // [1,2,3,4]
                code;
            }
        -->
        <button id="btn">출력</button>
        <div id="result"></div>
        
        <script>
            const people = ['kim','lee','park','hong'];
            console.log(people);
            for(let i=0; i<people.length; i++){
                console.log(people[i]);
            }

            console.log("--for of--");
            for(let p of people){
                console.log(p);
            }

            const me = {
                name:'hong',
                age: 20,
                email: '123@naver.com'
            }
            console.log("--for in--");
            for(let key in me){
                // me[keyName]
                console.log(key+":"+me[key]);
            }

            console.log("----------");

            const member = {
                name: 'park',
                age: 30,
                favors : ['baseball','game','movie']
            }
            for(let key in member){
                console.log(key+":"+member[key]);
                if(key == 'favors'){
                    for(let m of member[key]){
                        console.log(m);
                    }
                }
            }

            console.log("---------");
            const musician = {
                name: "IU",
                age : 20,
                addr : 'seoul',
                playList : ['너랑나','좋은날','밤편지']
            }
            document.getElementById('btn').addEventListener('click',clickEvent);

            function clickEvent(){
                const result = document.getElementById('result');
                let str = '<div>';
                    for(let key in musician){
                        if(key == 'playList'){
                            str += `<ul>`;
                            str += `playList : `;
                                for(let k of musician[key]){
                                    str+=`<li>${k}</li>`;
                                }
                            str += `</ul>`;
                        }else{
                            str+=`<div class="key">${key} : ${musician[key]}</div>`;
                        }
                    }
                    str += '</div>';
                result.innerHTML = str;
            }


        </script>
</body>
</html>
