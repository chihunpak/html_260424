<body>
    <h1>
        type_convert : 타입변환 == casting (형변환)
    </h1>
    <!-- 
        문자 -> 숫자 : 
            Number("숫자로 변환 가능한 문자") 
            parseInt("정수만") / parseFloat("실수만")
        숫자 -> 문자 :
            123.toString()
        문자 -> boolean : 
            Boolean("true")
        boolean -> 문자
            String(true)
        숫자 -> boolean : Boolean(1) / Boolean(0)
        boolean -> 숫자 : Number(true) / Number(false)

        true = 1 / false = 0

        boolean
        - 일반적인 데이터 타입 중 값이 있다 => true
        - 정확히 정의되지 않은 개념은 모두 false
          0, 빈문자열("", '', ``), undefined, null, NaN

        if(str){
        }
        
    -->

    <script>
        console.log(String(true), typeof String(true));
        console.log(Boolean(""), typeof Boolean(''));
    </script>
</body>
