<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            #03c75a
        */
        .search-box{
            width: 700px;
            height: 60px;
            margin: 50px auto;
            border: 1px solid #03c75a;
            border-radius: 30px;
        }
        .search-box>.icon{
            width: 50px;
            height: 50px;
            margin: 10px 20px;
            background-image: url(../image/imgi_129_pc.spring.n.png);
            background-position: center;
            background-size: 120%;
            float: left;
        }
        .search-box>input{
            width: 400px;
            height: 30px;
            margin-top: 15px;
            border: none;
            outline: none;
            font-size: 20px;
        }
        .search-box>.search-right{
            float: right;
            width: 150px;
            height: 30px;
            margin: 10px 20px;
            text-align: center;
            padding-top: 5px;
        }
        .search-box>.search-right>a{
            text-decoration: none;
            color: gray;
        }
        .search-box>.search-right>button{
            border: none;
            background-color: white;
        }
        .search-box>.search-right .bi-keyboard-fill{
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }
        .search-box>.search-right .bi-caret-down-fill{
            width: 15px;
            height: 15px;
            margin-right: 10px;
            padding-bottom: 5px;
        }
        .search-box>.search-right img{
            width: 25px;
            height: 25px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
