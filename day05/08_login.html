<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: beige;
        }
        .container{
            width: 300px;
            background-color: rgb(4, 74, 4);
            /* 화면의 정중앙에 위치*/
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            text-align: center;
            border-radius: 10px;
            padding: 20px 30px;
        }
        .container input{
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
            outline: none;
            border: none;
            border-radius: 5px;
        }
        .container input[type=submit]{
            font-weight: 700;
            font-size: 15px;
        }
        .container>.link{
            margin-top: 30px;
        }
        .container>.link>a{
            color: white;
            text-decoration: none;
            font-size: 13px;
        }
        .container>.link>a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <form action="">
            <input type="text" name="id" placeholder="아이디">
            <input type="password" name="pw" placeholder="비밀번호">
            <input type="submit" value="로그인">
        </form>
        <div class="link">
            <a href="">비밀번호를 잊어버리셨나요?</a>
        </div>
    </div>
</body>
</html>
