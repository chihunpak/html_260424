<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        p-box(h 150px) box(100*100) 3개를 나열 position 사용

        outer 300*300 > inner 100*100  정가운데 위치
    -->
    <style>
        .p-box{
            height: 150px;
            background-color: antiquewhite;
            position: relative;
        }
        .box{
            width: 100px;
            height: 100px;
            position: absolute;
        }
        .box1{
            background-color: brown;
            top: 25px;
            left: 25px;
        }
        .box2{
            background-color: rgb(42, 165, 65);
            top: 25px;
            left: 50%; /* 부모 박스 기준 절반만 */
            /* transform : 나의 요소가 변화하는 기능 translate: 움직임 */
            /* translate(x축, y축) */
            transform: translate(-50%);
        }
        .box3{
            background-color: rgb(226, 103, 162);
            top: 25px;
            right: 25px;
        }
        .outer{
            width: 300px;
            height: 300px;
            background-color: rgb(170, 121, 62);
            position: relative;
        }
        .inner{
            width: 100px;
            height: 100px;
            background-color: aliceblue;
            /* 요소를 정 가운데 위치시키는 방법 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

        }
    </style>
</head>
<body>
    <div class="p-box">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
    </div>
    <div class="outer">
        <div class="inner"></div>
    </div>
</body>
</html>
