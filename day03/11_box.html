<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        box-sizing : box의 크기를 지정하는 속성
        width : 컨텐츠의 가로 길이
        box-sizing에 따라 width 크기가 컨텐츠의 가로 길이가 될 수도 있고, 
        박스 전체의 가로 길이가 될 수도 있음.
        - border-box : width = 컨텐츠의 가로 + 패딩(왼+오)+테두리(왼+오)
        - content-box : width = 컨텐츠의 가로 (기본)

        width = 100px / padding = 5px / border = 1px
        - border-box : 가로길이(88px) + 5 + 5 + 1 + 1 => 100px
        - content-box : 가로길이(100px) + 5 + 5 + 1 + 1 => 112px

        padding : border 안쪽의 여백
        magin : border 바깥쪽의 여백
        top bottom left right 별도 설정가능

        magin : [ top = bottom = left = right ];  => 상하좌우 모두 같은 값
        magin : [top = bottom] [left = right]; => 상하  좌우
        magin : [top] [left = right] [bottom]; => 상 좌우 하
        magin : [top] [right] [bottom] [left]; => 시계방향
    -->
    <style>
        @font-face {
            font-family: BlackHanSans-Regular;
            src: url(../font/Black_Han_Sans/BlackHanSans-Regular.ttf);
        }
        @font-face {
            font-family: NanumGothic-Bold;
            src: url(../font/Nanum_Gothic/NanumGothic-Bold.ttf);
        }
        .box{
            width: 100px;
            height: 100px;
            padding: 5px;
            border: 1px solid black;
        }
        .box1{
            background-color: pink;
            box-sizing: border-box;
        }
        .box2{
            background-color: green;
            box-sizing: content-box;
        }
        .naver{
            width: 380px;
            height: 56px;
            margin: 10px 0;
            box-sizing: border-box;
            background-color: #03a94d;
            font-family: NanumGothic-Bold;
            color: white;
            font-size: 25px;
            text-align: center;
            /* 글자 영역을 높이만큼 맞춰서 세로 가운데 정렬 */
            /*line-height: 56px;*/
            /* 요소의 안쪽 여백을 넣어 글자를 아래로 밀어주는 방법 */
            padding: 13px 0;
            border: 1px solid #03a94d;
            border-radius: 5px;
        }
        a{
            text-decoration: none;
        }
        .naver:hover{
            cursor: pointer;
            background-color: #029b47;
            border: 1px solid #05bc57;
        }
    </style>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2"></div>

    <!-- naver box  380*56 -->
     <a href="http://naver.com" target="_blank">
        <div class="naver">naver</div>
     </a>
     
</body>
</html>
