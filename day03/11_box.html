<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        box-sizing : box의 크기를 지정하는 속성
        width : 컨텐츠의 가로 길이
        box-sizing에 따라 width 크기가 컨텐츠의 가로 길이가 될 수도 있고,
        박스 전체의 가로 길이가 될 수도 있음.
        - border-box : width = 컨텐츠의 가로 + 패딩(왼+오)+테두리(왼+오)
        - content-box : width = 컨텐츠의 가로 (기본)

        width = 100px / padding = 5px / border = 1px
        - border-box : 가로길이(88px) + 5 + 5 + 1 + 1 => 100px
        - content-box : 가로길이(100px) + 5 + 5 + 1 + 1 => 112px

        padding : border 안쪽의 여백
        magin : border 바깥쪽의 여백
        top bottom left right 별도 설정가능

        magin : [ top = bottom = left = right ]; => 상하좌우 모두 같은 값
        magin : [top = bottom] [left = right]; => 상하  좌우
        magin : [top] [left = right] [bottom]; => 상 좌우 하
        magin : [top] [right] [bottom] [left]; => 시계방향
    -->
    <style>
        .box{
            width: 100px;
            height: 100px;
            padding: 5px;
            border: 1px solid black;
        }
        .box1{
            background-color: pink;
            box-sizing: border-box;
        }
        .box2{
            background-color: green;
            box-sizing: border-box;
        }
            .naver-btn{
        box-sizing: border-box;
        width: 380px;
        height: 56px;

        background-color: #03C75A; /* 네이버 초록 */
        color: white;

        border: none;
        border-radius: 8px;

        font-size: 18px;
        font-weight: bold;

        display: flex;
        justify-content: center;
        align-items: center;

        cursor: pointer;
    }

    .naver-btn:hover{
        background-color: #02b350;
    }
    .naver-btn{
    text-decoration: none; /* 밑줄 제거 */
    margin-top: 20px;
    }
  
    </style>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2"></div>

    <!-- naver box 380*56 -->
    <a href="https://www.naver.com" class="naver-btn">NAVER</a>
</body>
</html>
