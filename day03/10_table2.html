<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 70%;
            border-collapse: collapse;
        }
        table th, td{
            /*border: 1px solid black;*/
            height: 30px;
            text-align: center;
        }
        table>thead>tr{
            background-color: aquamarine;
            border-top: 2px solid rgb(11, 11, 94);
            border-bottom: 2px solid rgb(11, 11, 94);
        }
        table>tbody>tr{
            border-bottom: 1px dashed rgb(0, 8, 98);
        }
        table>tbody>tr:last-child{
            border-bottom: 2px solid rgb(11, 11, 94);
        }
        table>tbody>tr:nth-child(2n){
            background-color: azure;
        }
        table>tbody>tr:hover{
            background-color: rgb(62, 4, 115);
            color: azure;
        }
        .w10{
            /* 부모 table 전체의 70% => 10%*/
            width: 10%;
        }
        .w50{
            width: 50%;
        }
        .w20{
            width: 20%;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>날짜</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="w10">1</td>

            </tr>
            <tr>

            <tr>

            </tr>
