<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 
        색상 관련 속성
        - color : 글자색
        - background-color : 배경색
        - border-color : 테두리 색

        색상 지정 방법
        - 이미 지정된 이름 사용하는 방법 : red, yello 등
        - 색상 코드를 이용하는 방법 : 16진수 색상 코드  #03c75a
        - 색상 팔레트를 이용하는 방법
          - rgb(0,0,0) 코드를 이용하는 방법
          - rgba(0,0,0,0) : a 투명도 0~1 (0.5 반투명)
        - 그라디언트 : 여러 색상을 조합 (https://cssgradient.io/)
        - background: linear-gradient(방향, 색상1, 색상2...)

        border-color : 선 색상
        선 두께, 선 모양, 색 한셋트로 설정
        border: 두께 모양 색
        border : 선두깨
        border-style : 모양
        border-color : 선 색상
    -->
    <style>
        div{
            width: 300px;
            height: 100px;
            text-align: center; /* 요소 가로 가운데 정렬 */
            line-height: 100px; /* 글자의 높이를 늘리는 역할 - 글자 가운데 정렬 역할 */
        }
        .color{
            color: brown;
            background-color: bisque;
        }
        .bg-color{
            color: white;
            background: #3288ab;
            background: linear-gradient(90deg, rgba(50, 136, 171, 1) 0%, rgba(71, 181, 117, 1) 36%, rgba(195, 230, 71, 1) 70%, rgba(232, 214, 51, 1) 100%);
        }
        .b-color{
            border: 1px solid #3288ab;
        }
        .box{
            /* https://www.color-name.com/ */
            background-color: #FFDBE2;
            color: #4D373B;
            border: 1px solid #1A1214;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="color">글자색</div>
    <div class="bg-color">배경색</div>
    <div class="b-color">테두리색</div>
    <div class="box">test</div>
</body>
</html>
