<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- type="number" : 위 아래 버튼이 생김, 숫자만 가능. min max -->
    <input type="number" value="1" min="0" max="10">

    <!-- 
        type="image" : 그림을 삽입하는 태그  img
        src="그림위치" alt="그림이 표시되지 않을 때 대체문자"
        상대경로 : 현재 내 파일로부터 상대적인 경로  ../
        절대경로 : 드라이브부터 파일까지의 경로 D:\web0260324\~
    -->
    <input type="image" src="../image/강아지.jpg" alt="강아지그림">
    <br>

    <br>

    <!-- type="range" : 범위값을 나타내는 상태 바 -->
    0<input type="range">10
</body>
</html>
