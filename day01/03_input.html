<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- input tag : 화면에서 서버로 데이터를 전송할 때 사용 -->
    <!-- 여러가지 속성 값이 다양해서 여러가지 기능들을 할 수 있음. -->
    <!-- form 태그와 같이 사용하여 서버로 전송 -->
    <!-- input type="타입" name:변수명, value:값, id:태그를 유일하게 구분 -->
    <!-- placeholder : 흐리게 안내문 표시, 문자를 입력하면 사라짐 -->
    <input type="text" name="id" id="a" placeholder="아이디">
    <input type="text" name="password" id="a" placeholder="패스워드">

    <!-- 
        type="button" : 일반버튼
        type="submit" : 전송버튼 - form 태그안의 값을 서버로 전송
        type="reset" : 취소버튼 - form 태그안의 값을 리셋
    -->
    <input type="button" value="button">
    <input type="submit" value="submit">
    <input type="reset" value="reset">
    <hr>
    <!-- 
        form tag : tag안의 정보를 서버로 전송
        action="" : 보낼 서버의 주소
        데이터를 전송하는 방식(method) 2가지
        get : 기본, 주소 뒤에 ? 붙여서 정보를 보내는 방식(queryString 방식)
        post : 반드시 입력, 데이터를 숨겨서 가는 방식 (내부 객체의 body에 숨겨서 전송)
        name="변수명", value="값"
        action?변수명=값&변수명=값&... : 쿼리스트링 방식은 띄어쓰기 하면 안됨.
    -->
    <form action="" method="get">
        <input type="text" name="id" id="a" placeholder="아이디">
        <input type="password" name="password" id="a" placeholder="패스워드">
        <input type="text" name="age" placeholder="나이"><br>

        <input type="button" value="button">
        <input type="submit" value="submit">
        <input type="reset" value="reset">
    </form>
    <!-- type="password" : 비밀번호를 *로 가려줌 -->
    <!-- type="checkbox" : 다중선택을 할 경우 사용 -->
    <input type="checkbox" name="" id="">사과
    <input type="checkbox" name="" id="">오렌지
    <input type="checkbox" name="" id="">바나나
    <br><hr>
    <form action="">
        <input type="checkbox" name="fruit" value="apple">apple
        <input type="checkbox" name="fruit" value="orange">orange
        <input type="checkbox" name="fruit" value="banana">banana
        <br>
        <input type="submit" value="submit">
    </form>
    <!-- lable : 다른 태그의 제목 역할을 함 
            for="연결태그 id" == id="값"
    -->
    <form action="">
        <input type="checkbox" id="apple" name="fruit" value="apple" checked>
        <label for="apple">apple</label>

        <label for="orange">
            <input type="checkbox" id="orange" name="fruit" value="orange">orange
        </label>
        <label for="banana">
            <input type="checkbox" id="banana" name="fruit" value="banana">banana
        </label>
        <br>
        <input type="submit" value="submit">
    </form>
    <!-- type="radio" : name이 같은 값 중 하나만 선택 가능 checked:기본선택 -->
    <form action="">
        <label for="apple1">
            <input type="radio" name="fruit2" id="apple1" value="apple" checked> apple
        </label>
        <label for="orange1">
            <input type="radio" name="fruit2" id="orange1" value="orange">orange
        </label>
        <label for="banana1">
            <input type="radio" name="fruit2" id="banana1" value="banana">banana
        </label>
        <input type="submit" value="submit">
    </form>
    <!-- 
        form, lable, radio 버튼을 이용하여
        10대, 20대, 30대, 40대이상 중 하나를 선택하여 값을 전송
    -->
    <form action="">
        <label for="10">
            <input type="radio" id="10" name="age" value="10대"> 10대
        </label>
        <label for="20">
            <input type="radio" id="20" name="age" value="20대" checked> 20대
        </label>
        <label for="30">
            <input type="radio" id="30" name="age" value="30대"> 30대
        </label>
        <label for="40">
            <input type="radio" id="40" name="age" value="40대이상"> 40대이상
        </label>
        <input type="submit" value="submit">
    </form>
    <hr>
    <!-- type="color" : 색상을 선택할 때 사용 -->
    <input type="color">
    <hr>
    <!-- 
        type="date" : 년월일
        type="month" : 년월
        type="week" : 년주
        type="datetime-local" : 년월일시분초
        type="time": 시분초
        datepicker라이브러리 주로 사용
    -->
    <input type="date">
    <input type="month">
    <input type="week">
    <input type="datetime-local">
    <input type="time">

    <hr>
    <!-- type="email" : email 형식에 맞지 않으면 알림표시
        type="url" : url 형식에 맞지 않으면 알림표시
    -->
    <form action="">
        <input type="email" name="email" placeholder="test@test.com">
        <input type="url" name="url" placeholder="http://www.test.com">
        <input type="submit" value="submit">
    </form>

    <!-- type="search" : text box 뒤에 x 버튼이 생김 -->
    <input type="search">
    <hr>

    <!-- type="file" : 첨부파일 1개 선택가능 -->
     <!-- 여러개 첨부파일을 선택하고 싶다면 multiple -->
    <input type="file">
    <input type="file" multiple>

    <!-- type="hidden" : 화면에서 안보이게 숨김, 데이터를 숨겨서 서버로 보낼때 -->
    <input type="hidden" name="id" value="admin1234">

    <br><br><br><br><br><br><br><br><br><br><br>
    
</body>
</html>
